services:
  - type: web
    name: shl-assessment-agent-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: shl-assessment-agent-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    envVars:
      - key: BACKEND_URL
        value: https://shl-assessment-agent-backend.onrender.com
        sync: false
